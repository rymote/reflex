name: Publish GitHub Packages

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  publish-github:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Extract version
        id: extract_version
        run: |
          TAG=${GITHUB_REF#refs/tags/}      # v1.2.3
          VERSION=${TAG#v}                  # 1.2.3
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Restore & build
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore

      - name: Pack Rymote.Reflex
        run: |
          dotnet pack Rymote.Reflex/Rymote.Reflex.csproj \
            --configuration Release \
            --no-build \
            --output ./artifacts \
            /p:Version=${{ env.VERSION }}

      - name: Pack Rymote.Reflex.Generators
        run: |
          dotnet pack Rymote.Reflex.Generators/Rymote.Reflex.Generators.csproj \
            --configuration Release \
            --no-build \
            --output ./artifacts \
            /p:Version=${{ env.VERSION }}

      - name: Pack Rymote.Reflex.Analyzers
        run: |
          dotnet pack Rymote.Reflex.Analyzers/Rymote.Reflex.Analyzers.csproj \
            --configuration Release \
            --no-build \
            --output ./artifacts \
            /p:Version=${{ env.VERSION }}

      - name: Push packages to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key $GITHUB_TOKEN \
            --skip-duplicate
